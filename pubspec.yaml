name: vyra_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

  # Firebase core services
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

  # Firebase messaging (optional now, but ok to keep)
  firebase_messaging: ^15.0.0

  # Local notifications (optional fallback)
  flutter_local_notifications: ^17.0.0

  # 🔥 ONE SIGNAL PUSH NOTIFICATIONS (MAIN ADD)
  onesignal_flutter: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png